name: Build and Deploy Carnap Server

on:
  push:
    branches:
      - master # Triggers when you push to your master/main branch

jobs:
  deploy:
    runs-on: ubuntu-latest # This gets you the free 4-core, 16GB RAM machine

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Crucial step to clear out ~30GB of Microsoft bloatware
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false

      # Installs Nix using the exact setup your project expects
      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      # Pulls pre-compiled parts from the project's cache
      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: carnap
          skipPush: true

      # 1. Build the Frontend into a specific output link
      - name: Build Client (GHCJS)
        run: nix-build -A client -o result-client

      # 2. Build the Backend into a specific output link
      - name: Build Server (Backend)
        run: nix-build -A server -o result-server

      # 3. Use the native Nix teleporter (Replaces SCP entirely)
      - name: Deploy to Live Server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          NIX_SSHOPTS: "-o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519"
        run: |
          mkdir -p ~/.ssh
          
          # Write the key, strip out hidden Windows carriage returns, and force a final newline
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          echo "" >> ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Beam the exact web of dependencies directly to your server
          nix-copy-closure --to root@$SERVER_IP ./result-client
          nix-copy-closure --to root@$SERVER_IP ./result-server

          # Create live symlinks so your systemd service always finds the newest push
          ssh $NIX_SSHOPTS root@$SERVER_IP "ln -sfn $(readlink -f result-client) /var/www/carnap/client"
          ssh $NIX_SSHOPTS root@$SERVER_IP "ln -sfn $(readlink -f result-server) /var/www/carnap/server"

      # 4. Restart the background service
      - name: Restart Server Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            systemctl restart carnap.service