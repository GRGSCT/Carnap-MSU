name: Build and Deploy Carnap Server

on:
  push:
    branches:
      - master # Triggers when you push to your master/main branch

jobs:
  deploy:
    runs-on: ubuntu-latest # This gets you the free 4-core, 16GB RAM machine

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Crucial step to clear out ~30GB of Microsoft bloatware
      # so Nix has enough room to build the client and server.
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false

      # Installs Nix using the exact setup your project expects
      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      # Pulls pre-compiled parts from the project's cache so you don't rebuild the universe
      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: carnap
          skipPush: true

        # 1. Build the Frontend and save it immediately
      - name: Build Client (GHCJS)
        run: |
          nix-build -A client
          mkdir -p deploy_bundle
          cp -rL result/* deploy_bundle/
          # Nix store files are read-only; make writable so server output can merge in
          chmod -R u+w deploy_bundle/

      # 2. Build the Backend and add it to the bundle
      - name: Build Server (Backend)
        run: |
          nix-build -A server
          cp -rL result/* deploy_bundle/

      # 3. Ensure deploy bundle is readable and traversable for SCP
      - name: Unlock File Permissions
        run: chmod -R u+rwX,go+rX deploy_bundle/


    # 4. Use native Linux SCP (bypasses Docker entirely)
      - name: Deploy to Live Server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          # Create the SSH directory
          mkdir -p ~/.ssh
          
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          # Automatically trust your droplet's IP address
          ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts
          
          # Securely copy the unzipped files directly to your server
          scp -r deploy_bundle/* root@$SERVER_IP:/var/www/carnap/
    

    
      - name: Restart Server Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Example restart command for a systemd service:
            systemctl restart carnap.service
            
